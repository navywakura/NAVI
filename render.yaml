services:
  - type: web
    name: navi-bot
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SECURE
        value: true
      - key: SYNC_COMMANDS
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: navi-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5

databases:
  - name: navi-postgres
    plan: basic-256mb
    region: frankfurt
